{{template "admin_layout" .}}
{{define "title"}}Logs{{end}}
{{define "content"}}
<section class="mb-8 rounded border border-gray-300 bg-white p-4">
<h2 class="text-lg font-bold mb-3">wp.org API check</h2>
<form id="wporg-form" class="flex flex-wrap items-end gap-2">
<label class="flex flex-col text-sm">
<span class="mb-1 font-medium">Type</span>
<select id="wporg-type" name="type" class="rounded border border-gray-300 px-2 py-1">
<option value="plugin" selected>Plugin</option>
<option value="theme">Theme</option>
</select>
</label>
<label class="flex flex-col text-sm flex-1 min-w-[16rem]">
<span class="mb-1 font-medium">Package name</span>
<input id="wporg-slug" name="slug" type="text" autocomplete="off" class="rounded border border-gray-300 px-2 py-1">
</label>
<button type="submit" class="px-4 py-1.5 rounded bg-gray-900 text-white text-sm hover:bg-gray-700">Check</button>
</form>
<div id="wporg-result" class="mt-3 text-sm"></div>
</section>
<div class="flex items-center justify-between mb-4">
<h1 class="text-xl font-bold">Logs</h1>
<div class="flex items-center gap-2 text-sm">
<span id="status" class="text-gray-400">Connecting...</span>
<button onclick="toggleScroll()" id="scrollBtn" class="px-3 py-1 rounded border border-gray-300 bg-white hover:bg-gray-50 text-xs">Auto-scroll: ON</button>
<button onclick="clearLog()" class="px-3 py-1 rounded border border-gray-300 bg-white hover:bg-gray-50 text-xs">Clear</button>
</div>
</div>
<div class="flex gap-1 mb-2" role="tablist">
<button onclick="switchTab('wppackages')" id="tab-wppackages" role="tab" class="px-4 py-2 text-sm font-medium rounded-t border border-b-0 border-gray-300 bg-white">wppackages.log</button>
<button onclick="switchTab('pipeline')" id="tab-pipeline" role="tab" class="px-4 py-2 text-sm font-medium rounded-t border border-b-0 border-gray-200 bg-gray-100 text-gray-500">pipeline.log</button>
<button onclick="switchTab('check-status')" id="tab-check-status" role="tab" class="px-4 py-2 text-sm font-medium rounded-t border border-b-0 border-gray-200 bg-gray-100 text-gray-500">check-status.log</button>
</div>
<div id="log-container" style="background:#111827; color:#f3f4f6; font-family:ui-monospace,monospace; font-size:0.75rem; line-height:1.625; border:1px solid #d1d5db; border-radius:0 0.25rem 0.25rem 0.25rem; height:calc(100vh - 260px); overflow-y:scroll; overflow-x:hidden;">
<pre id="log-output" style="padding:1rem; margin:0; white-space:pre-wrap; word-break:break-word;"></pre>
</div>
<script>
let currentTab = 'wppackages';
let eventSource = null;
let autoScroll = true;
const maxLines = 5000;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('[role="tab"]').forEach(function(el) {
    if (el.id === 'tab-' + tab) {
      el.className = 'px-4 py-2 text-sm font-medium rounded-t border border-b-0 border-gray-300 bg-white';
    } else {
      el.className = 'px-4 py-2 text-sm font-medium rounded-t border border-b-0 border-gray-200 bg-gray-100 text-gray-500';
    }
  });
  document.getElementById('log-output').textContent = '';
  connect();
}

function connect() {
  if (eventSource) {
    eventSource.close();
  }
  const status = document.getElementById('status');
  status.textContent = 'Connecting...';
  status.className = 'text-gray-400';

  eventSource = new EventSource('/admin/logs/stream?file=' + currentTab);
  eventSource.onopen = function() {
    status.textContent = 'Connected';
    status.className = 'text-green-600';
  };
  eventSource.onmessage = function(e) {
    const output = document.getElementById('log-output');
    const container = document.getElementById('log-container');
    output.textContent += e.data + '\n';

    // Trim if too many lines
    const lines = output.textContent.split('\n');
    if (lines.length > maxLines) {
      output.textContent = lines.slice(lines.length - maxLines).join('\n');
    }

    if (autoScroll) {
      container.scrollTop = container.scrollHeight;
    }
  };
  eventSource.onerror = function() {
    status.textContent = 'Disconnected';
    status.className = 'text-red-500';
    eventSource.close();
    setTimeout(connect, 3000);
  };
}

function toggleScroll() {
  autoScroll = !autoScroll;
  const btn = document.getElementById('scrollBtn');
  btn.textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
  if (autoScroll) {
    const container = document.getElementById('log-container');
    container.scrollTop = container.scrollHeight;
  }
}

function clearLog() {
  document.getElementById('log-output').textContent = '';
}

connect();

document.getElementById('wporg-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const type = document.getElementById('wporg-type').value;
  const slug = document.getElementById('wporg-slug').value.trim();
  const result = document.getElementById('wporg-result');
  if (!slug) {
    result.innerHTML = '<span class="text-red-600">Enter a package name.</span>';
    return;
  }
  result.innerHTML = '<span class="text-gray-500">Checking…</span>';
  try {
    const res = await fetch('/admin/wporg-check?type=' + encodeURIComponent(type) + '&slug=' + encodeURIComponent(slug));
    const body = await res.json();
    const labels = {
      open: '<span class="text-green-700 font-medium">Open</span>',
      closed: '<span class="text-red-700 font-medium">Closed</span>',
      closed_permanent: '<span class="text-red-700 font-medium">Closed (permanent)</span>',
      not_found: '<span class="text-yellow-700 font-medium">Not found</span>',
      error: '<span class="text-red-700 font-medium">Error</span>',
    };
    const label = labels[body.status] || body.status;
    const escape = function(s) { return s.replace(/[<>&]/g, function(c) { return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c]; }); };
    const detail = body.error ? ('<div class="text-red-700 mt-1">' + escape(body.error) + '</div>') : '';
    const meta = '<div class="text-xs text-gray-500 mt-1">HTTP ' + (body.http_status || '?') + ' · <a href="' + escape(body.url || '') + '" class="underline" rel="noopener">request URL</a></div>';
    const payload = body.data !== undefined ? body.data : (body.raw !== undefined ? body.raw : null);
    const formatted = payload === null ? '' : (typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2));
    const dataBlock = formatted ? ('<pre class="mt-2 p-2 bg-gray-900 text-gray-100 text-xs overflow-x-auto rounded whitespace-pre-wrap break-words">' + escape(formatted) + '</pre>') : '';
    result.innerHTML = '<div>' + label + ' — <code>' + escape(body.type + '/' + body.slug) + '</code></div>' + meta + detail + dataBlock;
  } catch (err) {
    result.innerHTML = '<span class="text-red-600">Request failed: ' + err + '</span>';
  }
});
</script>
{{end}}
